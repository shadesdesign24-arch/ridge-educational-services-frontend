      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              primary: "#0A1D37",
              accent: "#E5A01A",
              "bg-light": "#F8FAFC",

    <style>
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      .animate-float {
        animation: float 4s ease-in-out infinite;
      }
      .gradient-mesh {
        background-color: #0A1D37;
        background-image: 
          radial-gradient(at 0% 0%, rgba(229, 160, 26, 0.1) 0px, transparent 50%),
          radial-gradient(at 100% 0%, rgba(229, 160, 26, 0.05) 0px, transparent 50%);
      }
      .dark .gradient-mesh {
        background-color: #020617;
      }
      html {
        scroll-behavior: smooth;
      }
    </style>
